<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Roster — Club Membership</title>
<style>
  :root{
    --ink:#1c2b2d;
    --paper:#f3efe6;
    --brass:#b8902f;
    --brass-dark:#8a6a1f;
    --forest:#2f4a3f;
    --forest-light:#3e6354;
    --line:#d8cfbd;
    --red:#9b3b3b;
    --white:#fffdf8;
    --shadow: 0 8px 24px rgba(28,43,45,0.12);
    --serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    --sans: 'Inter', -apple-system, Segoe UI, sans-serif;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(28,43,45,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    min-height:100vh;
    padding: 24px;
  }
  .app{ max-width: 980px; margin: 0 auto; }

  header.masthead{
    border-bottom: 3px solid var(--ink);
    padding-bottom: 14px;
    margin-bottom: 22px;
    display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px;
  }
  header.masthead .title{
    font-family: var(--serif);
    font-weight: 900;
    font-size: 2.4rem;
    letter-spacing: 0.5px;
    line-height:1;
  }
  header.masthead .title span{ color: var(--brass); }
  header.masthead .sub{
    font-size: 0.78rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--forest);
    font-weight:600;
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand .logo-img{ width:56px; flex-shrink:0; object-fit:contain; }
  .login-box .brand{ justify-content:center; margin-bottom: 6px; }
  .login-box .brand .logo-img{ width:96px; }
  .whoami{
    font-size:0.85rem; text-align:right;
  }
  .whoami b{ font-family:var(--serif); font-size:1rem; }
  .whoami button{
    margin-top:4px; font-size:0.72rem; padding:4px 10px;
    background:none; border:1px solid var(--ink); border-radius:20px; cursor:pointer;
    font-family:var(--sans); font-weight:600;
  }
  .whoami button:hover{ background:var(--ink); color:var(--white); }
  .whoami button#sync-btn{ margin-left:6px; }
  .sync-status{ font-size:0.68rem; color:#889; margin-top:4px; letter-spacing:0.5px; }

  nav.tabs{
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom: 22px;
  }
  nav.tabs button{
    font-family: var(--serif);
    font-weight:700;
    font-size:0.95rem;
    padding: 9px 18px;
    background: var(--white);
    border: 1px solid var(--line);
    border-bottom: 3px solid transparent;
    cursor:pointer;
    color: var(--ink);
    border-radius: 4px 4px 0 0;
    transition: all .15s;
  }
  nav.tabs button.active{
    border-bottom: 3px solid var(--brass);
    color: var(--forest);
    background: var(--white);
  }
  nav.tabs button:hover{ background: var(--white); border-color: var(--brass); }

  .panel{
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: var(--shadow);
    padding: 26px;
    margin-bottom: 20px;
  }
  .panel h2{
    font-family: var(--serif);
    font-size:1.4rem;
    margin-bottom: 14px;
    color: var(--forest);
    display:flex; align-items:center; gap:10px;
  }
  .panel h2 .num{
    font-family: var(--mono); font-size:0.8rem; color:var(--brass);
    border:1px solid var(--brass); border-radius:50%; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; font-weight:700;
  }
  p.lede{ color:#566; margin-bottom:16px; font-size:0.92rem; }

  /* form */
  .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  @media (max-width:600px){ .grid2{grid-template-columns:1fr;} }
  label{ display:block; font-size:0.78rem; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--forest); margin-bottom:5px; }
  input, select, textarea{
    width:100%; padding:9px 11px; font-family:var(--sans); font-size:0.95rem;
    border:1px solid var(--line); border-radius:4px; background:var(--paper);
    color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--brass); outline-offset:1px; }
  .field{ margin-bottom:14px; }
  textarea{ resize:vertical; min-height:60px; }

  .btn{
    font-family:var(--serif); font-weight:700; font-size:0.95rem;
    padding:10px 22px; border-radius:4px; border:none; cursor:pointer;
    background: var(--forest); color:var(--white);
    transition: transform .1s, background .15s;
  }
  .btn:hover{ background: var(--forest-light); }
  .btn:active{ transform: scale(0.98); }
  .btn.brass{ background: var(--brass); }
  .btn.brass:hover{ background: var(--brass-dark); }
  .btn.outline{ background:none; border:1px solid var(--ink); color:var(--ink); }
  .btn.outline:hover{ background:var(--ink); color:var(--white); }
  .btn.danger{ background: var(--red); }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }

  /* ID card */
  .card-wrap{ display:flex; justify-content:center; padding: 10px 0; }
  .idcard{
    width: 380px; min-height: 230px;
    background: linear-gradient(135deg, var(--forest) 0%, #233b30 100%);
    color: var(--white);
    border-radius: 14px;
    padding: 20px 22px;
    position: relative;
    overflow:hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    font-family: var(--sans);
  }
  .idcard::before{
    content:"";
    position:absolute; top:-60px; right:-60px; width:180px; height:180px;
    border:14px solid rgba(184,144,47,0.18); border-radius:50%;
  }
  .idcard::after{
    content:"";
    position:absolute; bottom:-50px; left:-50px; width:140px; height:140px;
    border:10px solid rgba(184,144,47,0.12); border-radius:50%;
  }
  .idcard .org{ font-family:var(--serif); font-weight:900; font-size:1.05rem; letter-spacing:1px; }
  .idcard .org span{ color: var(--brass); }
  .idcard .org-sub{ font-size:0.62rem; letter-spacing:3px; text-transform:uppercase; opacity:0.7; margin-bottom: 14px;}
  .idcard .name{ font-family:var(--serif); font-size:1.5rem; font-weight:700; margin-top:0; }
  .idcard .role-tag{
    display:inline-block; font-size:0.65rem; letter-spacing:2px; text-transform:uppercase;
    background: var(--brass); color:var(--ink); padding:2px 10px; border-radius:10px; font-weight:700; margin-top:6px; margin-right:6px;
  }
  .idcard .role-tag--admin{ background: var(--red); color: var(--white); }
  .idcard .meta{ margin-top:14px; font-size:0.78rem; line-height:1.6; opacity:0.9; }
  .idcard .meta b{ color: var(--brass); font-weight:600; }
  .idcard-crest{ position:absolute; top:14px; right:16px; width:46px; z-index:1; opacity:0.85; }
  .idcard-crest img{ width:100%; display:block; }
  .idcard-body{ display:flex; gap:16px; align-items:flex-start; margin-top:6px; position:relative; z-index:1; }
  .card-photo{
    width:84px; height:104px; object-fit:cover; border-radius:6px;
    border:2px solid var(--brass); flex-shrink:0; background:rgba(255,255,255,0.08);
  }
  .card-photo--empty{
    display:flex; align-items:center; justify-content:center;
    font-family:var(--serif); font-weight:700; font-size:1.6rem; color: rgba(255,255,255,0.65);
  }
  .idcard-info{ flex:1; min-width:0; }
  .profile-photo-row{ display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .profile-photo{ width:72px; height:88px; object-fit:cover; border-radius:6px; border:2px solid var(--brass); }
  .profile-photo--empty{
    display:flex; align-items:center; justify-content:center;
    background: var(--forest); color:var(--brass);
    font-family:var(--serif); font-weight:700; font-size:1.4rem;
  }
  .thumb-photo{ width:36px; height:44px; object-fit:cover; border-radius:4px; border:1px solid var(--line); flex-shrink:0; }
  .thumb-photo--empty{
    display:flex; align-items:center; justify-content:center;
    background: var(--forest); color:var(--brass);
    font-family:var(--serif); font-weight:700; font-size:0.85rem;
  }
  .idcard .idnum{
    position:absolute; bottom:18px; right:22px; text-align:right;
    font-family: var(--mono); font-size:0.85rem; letter-spacing:1px; color: var(--brass);
  }
  .idcard .idnum small{ display:block; font-size:0.6rem; letter-spacing:2px; color:rgba(255,255,255,0.6); }

  /* tables */
  .table-wrap{ overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:0.9rem; }
  th, td{ text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); }
  th{ font-family:var(--serif); color:var(--forest); font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; }
  tr:hover td{ background: rgba(184,144,47,0.06); }
  .tag{ font-size:0.7rem; padding:2px 8px; border-radius:10px; font-weight:700; letter-spacing:0.5px; }
  .tag.admin{ background: var(--red); color:var(--white); }
  .tag.member{ background: var(--forest); color:var(--white); }
  .pos{ color: var(--forest); font-weight:700; }
  .neg{ color: var(--red); font-weight:700; }

  .stat-row{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px; }
  .stat{
    flex:1; min-width:140px; background:var(--paper); border:1px solid var(--line); border-radius:6px;
    padding:14px 16px; text-align:center;
  }
  .stat .v{ font-family:var(--serif); font-size:1.6rem; font-weight:700; color:var(--forest); }
  .stat .v.neg{ color: var(--red); }
  .stat .l{ font-size:0.72rem; text-transform:uppercase; letter-spacing:1.5px; color:#778; margin-top:4px; }

  .empty{ text-align:center; color:#889; padding:30px; font-style:italic; }
  .small{ font-size:0.78rem; color:#778; }
  .divider{ border:none; border-top:1px dashed var(--line); margin:18px 0; }
  .login-box{ max-width:440px; margin: 60px auto; }
  .login-box .panel{ text-align:center; }
  .login-box .title{ font-family:var(--serif); font-size:2rem; font-weight:900; margin-bottom:6px;}
  .login-box .title span{ color:var(--brass); }

  /* badges */
  .badge{
    display:inline-flex; align-items:center; justify-content:center;
    background: var(--red); color: var(--white);
    font-family: var(--sans); font-size:0.68rem; font-weight:700;
    min-width:18px; height:18px; padding:0 5px; border-radius:9px; line-height:1;
    vertical-align: middle;
  }

  /* upcoming events / birthdays */
  .event-item{
    display:flex; align-items:center; gap:14px;
    padding:12px 0; border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .event-item:last-child{ border-bottom:none; }
  .event-date{
    flex-shrink:0; width:54px; text-align:center;
    background: var(--forest); color:var(--white); border-radius:6px; padding:6px 4px;
  }
  .event-date-day{ font-family:var(--serif); font-size:1.3rem; font-weight:900; line-height:1; }
  .event-date-month{ font-size:0.65rem; letter-spacing:1px; text-transform:uppercase; color: var(--brass); margin-top:2px; }
  .event-body{ flex:1; min-width:160px; }
  .event-title{ font-family:var(--serif); font-weight:700; font-size:1rem; }
  .event-actions{ display:flex; gap:8px; flex-wrap:wrap; }

  /* notices / minutes cards */
  .notice-card{
    border:1px solid var(--line); border-radius:6px; padding:14px 16px; margin-bottom:14px; background: var(--paper);
  }
  .notice-card--unread{ border-color: var(--brass); box-shadow: 0 0 0 1px var(--brass) inset; }
  .notice-title{ font-family:var(--serif); font-weight:700; font-size:1.05rem; margin-bottom:4px; }
  .notice-card p{ margin-top:8px; font-size:0.92rem; line-height:1.5; }
</style>
</head>
<body>
<div id="root" class="app"></div>

<script>
const STORAGE_KEY = 'club-members';
const ME_KEY = 'club-current-user';
const ORG_KEY = 'club-org-finance';
const READ_KEY = 'club-notices-read';

// ---------------- SHARED BACKEND (Supabase) ----------------
// Member and organization data is shared by every visitor via a small Supabase
// table called `club_data` (columns: key text primary key, value jsonb).
// "Who am I" and "which notices have I read" stay on this device only (localStorage),
// since there's no real authentication — they're just local conveniences.
const SUPABASE_URL = 'https://jpznrizkvqznesovmblb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AncuHz9DfKfU1zk6W-JLww_TksP7elL';

async function supaGet(key){
  const url = `${SUPABASE_URL}/rest/v1/club_data?key=eq.${encodeURIComponent(key)}&select=value`;
  const res = await fetch(url, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) throw new Error(`Could not load "${key}" (status ${res.status})`);
  const rows = await res.json();
  return rows.length ? rows[0].value : null;
}

async function supaSet(key, value){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/club_data`, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
  });
  if(!res.ok) throw new Error(`Could not save "${key}" (status ${res.status})`);
}

function defaultOrg(){
  return {
    name: "Elite Men's Club", balance: 0, log: [], minutes: [], rules: '', notices: [], submissions: [], events: [], description: '', activityLog: []
  };
}

const POSITIONS = ['Member','President','Vice President','Secretary','Treasurer','Financial Secretary','Public Relations Officer'];

// Granular permissions an admin can grant to (or take away from) any member,
// independent of their position title.
const PERMISSION_DEFS = [
  { id:'editRules',      label:'Edit Rules & Regulations' },
  { id:'editMinutes',    label:'Record Meeting Minutes' },
  { id:'manageEvents',   label:'Manage Events Calendar' },
  { id:'postNotices',    label:'Post Notices' },
  { id:'approveFinance', label:'Approve Financial Submissions' },
];

// Sensible starting permissions applied the first time a member is assigned a position.
// Admins can freely adjust these afterwards (e.g. take a right away from the President).
const POSITION_DEFAULT_PERMISSIONS = {
  'President':            { editRules:true, manageEvents:true, postNotices:true },
  'Vice President':       { manageEvents:true },
  'Secretary':            { editMinutes:true, manageEvents:true },
  'Treasurer':            { approveFinance:true },
  'Financial Secretary':  { approveFinance:true },
  'Public Relations Officer': { postNotices:true },
  'Member':               {}
};
function blankPermissions(){
  const p = {};
  PERMISSION_DEFS.forEach(d => p[d.id] = false);
  return p;
}

let state = {
  members: {},      // id -> member object
  org: defaultOrg(),
  me: null,          // member id of current user
  tab: 'overview',
  readNotices: [],   // notice ids this device has marked as read
  syncStatus: 'idle',   // 'idle' | 'syncing' | 'ok' | 'error'
  syncError: null,
  lastSynced: null
};

function genId(prefix){
  return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,6)}`;
}

function logActivity(action){
  state.org.activityLog = state.org.activityLog || [];
  state.org.activityLog.push({
    date: new Date().toISOString().slice(0,10),
    actor: (meRecord()||{}).name || 'System',
    action
  });
  if(state.org.activityLog.length > 100) state.org.activityLog = state.org.activityLog.slice(-100);
}

function fmtMoney(n){
  const v = Number(n)||0;
  return (v<0 ? '-€' : '€') + Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
}

function genMemberId(){
  const year = new Date().getFullYear();
  let n = 1;
  const existing = Object.values(state.members);
  while(existing.some(m => m.id === `EMC-${year}-${String(n).padStart(4,'0')}`)) n++;
  return `EMC-${year}-${String(n).padStart(4,'0')}`;
}

async function loadAll(){
  state.syncStatus = 'syncing';
  try{
    const [membersVal, orgVal] = await Promise.all([
      supaGet(STORAGE_KEY),
      supaGet(ORG_KEY)
    ]);
    state.members = membersVal || {};
    state.org = Object.assign(defaultOrg(), orgVal || {});
    state.syncStatus = 'ok';
    state.syncError = null;
    state.lastSynced = new Date();
  }catch(e){
    state.syncStatus = 'error';
    state.syncError = e.message;
  }

  // Personal, per-device info — no shared backend needed for these.
  try{
    const v = localStorage.getItem(ME_KEY);
    state.me = v ? JSON.parse(v) : null;
  }catch(e){ state.me = null; }
  try{
    const v = localStorage.getItem(READ_KEY);
    state.readNotices = v ? JSON.parse(v) : [];
  }catch(e){ state.readNotices = []; }
}

// Re-fetch shared data from the server. Returns true on success.
async function syncFromServer(){
  state.syncStatus = 'syncing';
  try{
    const [membersVal, orgVal] = await Promise.all([
      supaGet(STORAGE_KEY),
      supaGet(ORG_KEY)
    ]);
    state.members = membersVal || {};
    state.org = Object.assign(defaultOrg(), orgVal || {});
    state.syncStatus = 'ok';
    state.syncError = null;
    state.lastSynced = new Date();
    return true;
  }catch(e){
    state.syncStatus = 'error';
    state.syncError = e.message;
    return false;
  }
}

async function saveReadNotices(){
  try{ localStorage.setItem(READ_KEY, JSON.stringify(state.readNotices)); }catch(e){}
}

async function saveMembers(){
  try{
    await supaSet(STORAGE_KEY, state.members);
    state.syncStatus = 'ok'; state.syncError = null; state.lastSynced = new Date();
  }catch(e){
    state.syncStatus = 'error'; state.syncError = e.message;
    alert('Your change was applied here, but could not be saved to the shared database: ' + e.message + '\n\nIt may not be visible to other members. Check your connection and try again.');

}

    alert('Your change was applied here, but could not be saved to the shared database: ' + e.message + '\n\nIt may not be visible to other members. Check your connection and try again.');
  }
}
async function saveMe(){
  try{ localStorage.setItem(ME_KEY, JSON.stringify(state.me)); }catch(e){}
}

function meRecord(){
  return state.me ? state.members[state.me] : null;
}
function isAdmin(){
  const m = meRecord();
  return m && m.role === 'admin';
}
function myPosition(){
  const m = meRecord();
  return m && m.position ? m.position : 'Member';
}
function hasPermission(m, permId){
  if(!m) return false;
  if(m.role === 'admin') return true;
  return !!(m.permissions && m.permissions[permId]);
}
function canEditMinutes(){
  return hasPermission(meRecord(), 'editMinutes');
}
function canEditRules(){
  return hasPermission(meRecord(), 'editRules');
}
function canPostNotices(){
  return hasPermission(meRecord(), 'postNotices');
}
function canApproveFinance(){
  return hasPermission(meRecord(), 'approveFinance');
}
function unreadNoticeCount(){
  const all = (state.org.notices||[]).map(n=>n.id);
  return all.filter(id => !state.readNotices.includes(id)).length;
}
function currentMonthKey(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}
function fmtMonthKey(key){
  const [y,mo] = key.split('-').map(Number);
  return new Date(y, mo-1, 1).toLocaleDateString(undefined,{month:'long', year:'numeric'});
}

// ---- Date / birthday helpers ----
function nextBirthday(dob){
  if(!dob) return null;
  const parts = dob.split('-').map(Number);
  if(parts.length !== 3) return null;
  const [y, mo, d] = parts;
  const today = new Date(); today.setHours(0,0,0,0);
  let next = new Date(today.getFullYear(), mo-1, d);
  if(next < today) next = new Date(today.getFullYear()+1, mo-1, d);
  const days = Math.round((next - today) / 86400000);
  const turning = next.getFullYear() - y;
  return { date: next, days, turning };
}
function fmtDateLong(d){
  return d.toLocaleDateString(undefined, { day:'numeric', month:'long' });
}
function pad(n){ return String(n).padStart(2,'0'); }
function icsDate(d){
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
}
function googleCalLink(title, date, details){
  const d = icsDate(date);
  const next = new Date(date); next.setDate(next.getDate()+1);
  const params = new URLSearchParams({
    action: 'TEMPLATE', text: title, dates: `${d}/${icsDate(next)}`, details: details||''
  });
  return `https://www.google.com/calendar/render?${params.toString()}`;
}
function icsDataUrl(title, date, details){
  const d = icsDate(date);
  const next = new Date(date); next.setDate(next.getDate()+1);
  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',
    `SUMMARY:${title}`, `DTSTART;VALUE=DATE:${d}`, `DTEND;VALUE=DATE:${icsDate(next)}`,
    `DESCRIPTION:${(details||'').replace(/\n/g,'\\n')}`,
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  return 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
}
function canManageEvents(){
  return hasPermission(meRecord(), 'manageEvents');
}
// Combine member birthdays with club-organized events into a single sorted, upcoming list
function upcomingItems(limit){
  const items = [];
  Object.values(state.members).forEach(m => {
    const nb = nextBirthday(m.dob);
    if(nb){
      items.push({ date: nb.date, title: `${m.name}'s Birthday`, details: `Turning ${nb.turning}`, type: 'birthday', days: nb.days });
    }
  });
  const today = new Date(); today.setHours(0,0,0,0);
  (state.org.events||[]).forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    if(d >= today){
      const days = Math.round((d - today) / 86400000);
      items.push({ date: d, title: e.title, details: e.description||'', type: 'event', days });
    }
  });
  items.sort((a,b) => a.date - b.date);
  return limit ? items.slice(0, limit) : items;
}
function renderUpcomingItem(item){
  const gcal = googleCalLink(item.title, item.date, item.details);
  const ics = icsDataUrl(item.title, item.date, item.details);
  const dayLabel = item.days===0 ? 'Today' : (item.days===1 ? 'Tomorrow' : `In ${item.days} days`);
  return `

      <div class="event-date-day">${item.date.getDate()}</div>

function fmtRelativeTime(date){
  if(!date) return '';
  const secs = Math.round((Date.now() - date.getTime())/1000);
  if(secs < 10) return 'just now';
  if(secs < 60) return `${secs}s ago`;
  const mins = Math.round(secs/60);
  if(mins < 60) return `${mins}m ago`;
  const hrs = Math.round(mins/60);
  return `${hrs}h ago`;
}

function tabBadge(tabId){
  if(tabId === 'notices'){
    const n = unreadNoticeCount();
    return n>0 ? ` <span class="badge">${n}</span>` : '';
  }
  if(tabId === 'finance' && canApproveFinance()){
    const n = (state.org.submissions||[]).filter(s=>s.status==='pending').length;
    return n>0 ? ` <span class="badge">${n}</span>` : '';
  }
  return '';
}

function renderTab(){
  switch(state.tab){
    case 'overview': return renderOverview();
    case 'profile': return renderProfile();
    case 'idcard': return renderIdCard();
    case 'directory': return renderDirectory();
    case 'finance': return renderFinance();
    case 'events': return renderEvents();
    case 'minutes': return renderMinutes();
    case 'rules': return renderRules();
    case 'notices': return renderNotices();
    case 'admin': return isAdmin() ? renderAdmin() : '<div class="panel">Not authorized.</div>';
    default: return '';
  }
}

function initials(name){

function readAndResizeImage(file, maxDim){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load image'));
      img.onload = () => {
        let { width, height } = img;
        if(width > height){
          if(width > maxDim){ height = Math.round(height * maxDim / width); width = maxDim; }
        } else {
          if(height > maxDim){ width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function submissionLabel(s){
  if(s.type === 'contribution') return `Monthly Contribution (${fmtMonthKey(s.period)})`;
  if(s.type === 'dues') return 'Membership Dues';
  if(s.type === 'fine') return 'Fine Payment';
  return s.type;
}

function renderApprovalQueue(){
  const pending = (state.org.submissions||[]).filter(s=>s.status==='pending');

    const member = state.members[s.memberId];
    return `
    <tr>

    return `

      <div class="small">${n.date} · posted by ${escapeHtml(n.author||'Admin')}</div>

      <button class="btn outline" id="mark-read-btn">Mark all as read</button>
      <button class="btn outline" id="enable-notif-btn">Enable browser notifications</button>
    </div>
    <p class="small" style="margin-bottom:14px;">Note: browser notifications only appear while this app is open in a tab. True push notifications and automatic emails to members require a backend notification service, which is outside what a single-page app can do on its own — this in-app board plus optional browser alerts is the closest equivalent.</p>
    ${formHtml}
    ${items || '<p class="empty">No notices yet.</p>'}
  </div>`;

function attachNoticesHandlers(){
  const postBtn = document.getElementById('post-notice-btn');
  if(postBtn){
    postBtn.onclick = async () => {
      const title = document.getElementById('notice-title').value.trim();
      const body = document.getElementById('notice-body').value.trim();
      if(!title || !body){ alert('Please enter a title and message.'); return; }
      state.org.notices = state.org.notices || [];
      const notice = { id: genId('not'), title, body, date: new Date().toISOString().slice(0,10), author: meRecord().name };
      state.org.notices.unshift(notice);
      logActivity(`Posted notice: "${title}"`);
      await saveOrg();
      if('Notification' in window && Notification.permission === 'granted'){
        try{ new Notification(`${state.org.name}: ${title}`, { body }); }catch(e){}
      }
      render();
    };
  }
  document.querySelectorAll('.remove-notice-btn').forEach(btn => {
    btn.onclick = async () => {
      if(!confirm('Remove this notice?')) return;
      state.org.notices = (state.org.notices||[]).filter(n=>n.id!==btn.dataset.id);
      await saveOrg();
      render();
    };
  });
  const markReadBtn = document.getElementById('mark-read-btn');
  if(markReadBtn){
    markReadBtn.onclick = async () => {
      const ids = (state.org.notices||[]).map(n=>n.id);
      state.readNotices = Array.from(new Set(state.readNotices.concat(ids)));
      await saveReadNotices();
      render();
    };
  }
  const enableBtn = document.getElementById('enable-notif-btn');
  if(enableBtn){
    enableBtn.onclick = async () => {
      if(!('Notification' in window)){ alert('Notifications are not supported in this browser.'); return; }
      const perm = await Notification.requestPermission();
      if(perm === 'granted'){ alert("Notifications enabled. You'll see alerts for new notices while this app is open."); }
      else { alert('Notification permission was not granted.'); }
    };
  }
}

    </table>
    </div>
  </div>

  <div class="panel">
    <h2>Admin · Roles &amp; Permissions</h2>
    <p class="lede">Grant or revoke specific rights for any member — independent of their position title. For example, you can take away rule-editing rights from a President while leaving their other privileges intact, or grant notice-posting rights to a regular member. Admins always have full access.</p>
    <div class="table-wrap">
    <table>
      <thead><tr><th>Member</th>${PERMISSION_DEFS.map(p=>`<th style="text-align:center;">${p.label}</th>`).join('')}<th></th></tr></thead>
      <tbody>${permRows || `<tr><td colspan="${PERMISSION_DEFS.length+2}" class="empty">No members yet.</td></tr>`}</tbody>
    </table>
    </div>
  </div>

  <div class="panel">
    <h2>Admin · Treasury &amp; Transactions</h2>
    <p class="lede">Adjust the club's overall treasury balance and log a transaction.</p>
    <div class="grid2">
      <div class="field"><label>Club Treasury Balance (€)</label><input id="org-balance" type="number" step="0.01" value="${state.org.balance}"></div>
      <div class="field"><label>Club / Organization Name</label><input id="org-name" value="${escapeAttr(state.org.name)}"></div>
    </div>
    <div class="btn-row" style="margin-bottom:18px;">
      <button class="btn brass" id="save-org-btn">Save Treasury Settings</button>
    </div>
    <hr class="divider">
    <h3 style="font-family:var(--serif); margin-bottom:8px; color:var(--forest);">Log a Transaction</h3>
    <div class="grid2">
      <div class="field"><label>Description</label><input id="tx-desc" placeholder="e.g. Venue deposit for annual gathering"></div>
      <div class="field"><label>Amount (€, use negative for expenses)</label><input id="tx-amount" type="number" step="0.01" placeholder="e.g. -150.00"></div>
    </div>
    <button class="btn" id="add-tx-btn">Add Transaction</button>
  </div>

  <div class="panel">
    <h2>Admin · Organization Settings</h2>
    <p class="lede">Editable overview shown to all members on the Welcome page. The club name and treasury are set above.</p>
    <div class="field"><label>Welcome / Overview Message</label><textarea id="org-description" style="min-height:120px;" placeholder="A short welcome message, mission statement, or summary of the club...">${escapeHtml(state.org.description||'')}</textarea></div>
    <button class="btn brass" id="save-org-description-btn">Save Overview</button>
  </div>

  <div class="panel">
    <h2>Admin · Recent Activity</h2>
    <p class="lede">An audit trail of recent administrative actions, for accountability.</p>
    <div class="table-wrap">
    <table>
      <thead><tr><th>Date</th><th>By</th><th>Action</th></tr></thead>
      <tbody>${logEntries || '<tr><td colspan="3" class="empty">No activity recorded yet.</td></tr>'}</tbody>
    </table>
    </div>
  </div>`;
}

// ---------------- FINANCE SUBMISSION HANDLERS ----------------
function attachFinanceHandlers(){
  const typeSel = document.getElementById('sub-type');
  const periodField = document.getElementById('sub-period-field');
  if(typeSel){
    const togglePeriod = () => {
      periodField.style.display = typeSel.value === 'contribution' ? '' : 'none';
    };
    typeSel.onchange = togglePeriod;
    togglePeriod();
  }
  const submitBtn = document.getElementById('submit-payment-btn');
  if(submitBtn){
    submitBtn.onclick = async () => {
      const m = meRecord();
      const type = document.getElementById('sub-type').value;
      const amount = parseFloat(document.getElementById('sub-amount').value);
      const date = document.getElementById('sub-date').value || new Date().toISOString().slice(0,10);
      const period = type === 'contribution' ? document.getElementById('sub-period').value : date;
      const note = document.getElementById('sub-note').value.trim();
      if(isNaN(amount) || amount <= 0){ alert('Please enter a valid amount.'); return; }
      state.org.submissions = state.org.submissions || [];
      state.org.submissions.push({
        id: genId('sub'), memberId: m.id, type, period, amount, date, note,
        status: 'pending', submittedAt: new Date().toISOString()
      });
      await saveOrg();
      render();
    };
  }
  document.querySelectorAll('.approve-sub-btn').forEach(btn => {
    btn.onclick = async () => {
      const sub = (state.org.submissions||[]).find(s=>s.id===btn.dataset.id);
      if(!sub) return;
      const member = state.members[sub.memberId];
      if(!member){ alert('Member no longer exists.'); return; }
      sub.status = 'approved';
      sub.reviewedBy = meRecord().name;
      sub.reviewedDate = new Date().toISOString().slice(0,10);
      if(sub.type === 'contribution'){
        member.contributions = member.contributions || {};
        member.contributions[sub.period] = 'paid';
      } else if(sub.type === 'dues'){
        member.dues.status = 'paid';
        member.dues.lastPaid = sub.date;
      } else if(sub.type === 'fine'){
        member.fines = Math.max(0, (Number(member.fines)||0) - sub.amount);
      }
      state.org.balance = (Number(state.org.balance)||0) + sub.amount;
      state.org.log = state.org.log || [];
      state.org.log.push({ date: sub.date, desc: `${member.name} — ${submissionLabel(sub)}`, amount: sub.amount });
      logActivity(`Approved ${submissionLabel(sub)} of ${fmtMoney(sub.amount)} for ${member.name}`);
      await saveMembers();
      await saveOrg();
      render();
    };
  });
  document.querySelectorAll('.reject-sub-btn').forEach(btn => {
    btn.onclick = async () => {
      const sub = (state.org.submissions||[]).find(s=>s.id===btn.dataset.id);
      if(!sub) return;
      if(!confirm('Reject this payment submission?')) return;
      const member = state.members[sub.memberId];
      sub.status = 'rejected';
      sub.reviewedBy = meRecord().name;
      sub.reviewedDate = new Date().toISOString().slice(0,10);
      logActivity(`Rejected ${submissionLabel(sub)} of ${fmtMoney(sub.amount)} for ${member?member.name:'a former member'}`);
      await saveOrg();
      render();
    };
  });
}

function attachAdminHandlers(){
  document.querySelectorAll('.save-member-btn').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const m = state.members[id];
      const row = btn.closest('tr');

      const newRole = row.querySelector('.role-select').value;
      const isLastAdmin = m.role === 'admin' && Object.values(state.members).filter(x=>x.role==='admin').length <= 1;
      if(isLastAdmin && newRole !== 'admin'){
        if(!confirm('This is the only admin account. Removing admin rights will leave the club without an admin to manage it. Continue anyway?')) return;
      }
      if(newRole !== m.role){
        logActivity(`Changed ${m.name}'s role from ${m.role} to ${newRole}`);
      }
      m.role = newRole;

      const newPosition = row.querySelector('.position-select').value;
      if(newPosition !== (m.position||'Member')){
        m.permissions = Object.assign(blankPermissions(), POSITION_DEFAULT_PERMISSIONS[newPosition] || {});
        logActivity(`Changed ${m.name}'s position from ${m.position||'Member'} to ${newPosition} (default permissions applied)`);
      }
      m.position = newPosition;

      const newStatus = row.querySelector('.status-select').value;
      if(newStatus !== (m.status||'active')){
        logActivity(`Marked ${m.name} as ${newStatus}`);
      }
      m.status = newStatus;

      m.balance = parseFloat(row.querySelector('.bal-input').value) || 0;
      m.monthlyContribution = parseFloat(row.querySelector('.contrib-input').value) || 0;
      m.fines = parseFloat(row.querySelector('.fines-input').value) || 0;
      m.dues.status = row.querySelector('.dues-status').value;
      m.dues.amount = parseFloat(row.querySelector('.dues-amount').value) || 0;
      if(m.dues.status === 'paid'){ m.dues.lastPaid = new Date().toISOString().slice(0,10); }
      await saveMembers();
      await saveOrg();
      render();
    };
  });
  document.querySelectorAll('.save-perm-btn').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const m = state.members[id];
      if(m.role === 'admin') return;
      const row = btn.closest('tr');
      const newPerms = {};
      PERMISSION_DEFS.forEach(p => {
        const cb = row.querySelector(`.perm-check[data-perm="${p.id}"]`);
        newPerms[p.id] = !!(cb && cb.checked);
      });
      m.permissions = newPerms;
      logActivity(`Updated permissions for ${m.name}`);
      await saveMembers();
      await saveOrg();
      render();
    };
  });
  document.querySelectorAll('.reset-perm-btn').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const m = state.members[id];
      if(m.role === 'admin') return;
      if(!confirm(`Reset ${m.name}'s permissions to the defaults for "${m.position||'Member'}"?`)) return;
      m.permissions = Object.assign(blankPermissions(), POSITION_DEFAULT_PERMISSIONS[m.position||'Member'] || {});
      logActivity(`Reset ${m.name}'s permissions to ${m.position||'Member'} defaults`);
      await saveMembers();
      await saveOrg();
      render();
    };
  });
  document.querySelectorAll('.reset-pin-btn').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const newPin = prompt(`Set a new PIN for ${state.members[id].name} (4–6 digits):`);
      if(newPin === null) return;
      if(!/^\d{4,6}$/.test(newPin.trim())){ alert('PIN must be 4–6 digits.'); return; }
      state.members[id].pin = newPin.trim();
      logActivity(`Reset PIN for ${state.members[id].name}`);
      await saveMembers();
      await saveOrg();
      alert('PIN reset.');
    };
  });
  document.querySelectorAll('.remove-member-btn').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      if(id === state.me){ alert("You can't remove your own profile while logged in."); return; }
      const target = state.members[id];
      if(target.role === 'admin' && Object.values(state.members).filter(x=>x.role==='admin').length <= 1){
        alert("This is the only admin account — assign admin rights to another member before removing it.");
        return;
      }
      if(!confirm(`Remove member ${target.name}? This cannot be undone.`)) return;
      logActivity(`Removed member ${target.name} (${target.id})`);
      delete state.members[id];
      await saveMembers();
      await saveOrg();
      render();
    };
  });
  const saveOrgBtn = document.getElementById('save-org-btn');
  if(saveOrgBtn){
    saveOrgBtn.onclick = async () => {
      state.org.balance = parseFloat(document.getElementById('org-balance').value) || 0;
      state.org.name = document.getElementById('org-name').value.trim() || state.org.name;
      logActivity('Updated treasury settings');
      await saveOrg();
      render();
    };
  }
  const addTxBtn = document.getElementById('add-tx-btn');
  if(addTxBtn){
    addTxBtn.onclick = async () => {
      const desc = document.getElementById('tx-desc').value.trim();
      const amount = parseFloat(document.getElementById('tx-amount').value);
      if(!desc || isNaN(amount)){ alert('Please enter a description and amount.'); return; }
      state.org.log = state.org.log || [];
      state.org.log.push({ date: new Date().toISOString().slice(0,10), desc, amount });
      state.org.balance = (Number(state.org.balance)||0) + amount;
      logActivity(`Logged transaction: ${desc} (${fmtMoney(amount)})`);
      await saveOrg();
      render();
    };
  }
  const saveDescBtn = document.getElementById('save-org-description-btn');
  if(saveDescBtn){
    saveDescBtn.onclick = async () => {
      state.org.description = document.getElementById('org-description').value;
      logActivity('Updated organization overview');
      await saveOrg();
      render();
    };
  }
}

// ---------------- HANDLERS / UTIL ----------------
function attachGlobalHandlers(){
  document.getElementById('logout-btn').onclick = async () => {
    state.me = null;
    await saveMe();
    render();
  };
  const syncBtn = document.getElementById('sync-btn');
  if(syncBtn){
    syncBtn.onclick = async () => {
      await syncFromServer();
      render();
    };
  }
  document.querySelectorAll('nav.tabs button').forEach(btn => {
    btn.onclick = () => {
      state.tab = btn.dataset.tab;
      render();
      backgroundRefresh();
    };
  });
}

// Quietly re-fetch shared data and re-render, but only if the user
// isn't actively typing into a form field (to avoid disrupting input).
function backgroundRefresh(){
  syncFromServer().then(() => {
    const active = document.activeElement;
    const tag = active && active.tagName;
    if(!['INPUT','TEXTAREA','SELECT'].includes(tag)){
      render();
    }
  });
}

function attachTabHandlers(){
  attachProfileHandlers();
  attachIdCardHandlers();
  attachDirectoryHandlers();
  attachFinanceHandlers();
  attachEventsHandlers();
  attachMinutesHandlers();
  attachRulesHandlers();
  attachNoticesHandlers();
  attachAdminHandlers();
}

function attachDirectoryHandlers(){
  const search = document.getElementById('directory-search');
  if(search){
    search.oninput = () => {
      const cursorPos = search.selectionStart;
      state.directoryQuery = search.value;
      render();
      const newSearch = document.getElementById('directory-search');
      if(newSearch){
        newSearch.focus();
        try{ newSearch.setSelectionRange(cursorPos, cursorPos); }catch(e){}
      }
    };
  }
  const showInactive = document.getElementById('directory-show-inactive');
  if(showInactive){
    showInactive.onchange = () => {
      state.showInactive = showInactive.checked;
      render();
    };
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

// ---------------- INIT ----------------
(async function init(){
  document.getElementById('root').innerHTML = '<div class="panel empty">Connecting to club database…</div>';
  try{
    await loadAll();
    if(state.me && !state.members[state.me]) state.me = null;
    render();
  }catch(err){
    document.getElementById('root').innerHTML = `<div class="panel"><h2>Something went wrong</h2><p>${escapeHtml(err.message||String(err))}</p></div>`;
    console.error(err);
  }

  // Periodically refresh shared data in the background so changes made by
  // other members (on other devices) show up without a manual reload.
  setInterval(backgroundRefresh, 45000);
})();
</script>
